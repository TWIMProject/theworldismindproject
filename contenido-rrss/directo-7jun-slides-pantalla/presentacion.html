<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La voz que te juzga · 7 jun 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#FDFCFA;overflow:hidden;font-family:system-ui,sans-serif}
.stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.stage img{max-width:100%;max-height:100%;object-fit:contain;transition:opacity .25s ease}
.bar{position:fixed;bottom:18px;left:0;right:0;display:flex;justify-content:center;gap:10px;opacity:.35;transition:opacity .2s}
.bar:hover{opacity:.9}
.dot{width:9px;height:9px;border-radius:50%;background:#C2A78B;cursor:pointer;transition:transform .15s}
.dot.active{background:#173D30;transform:scale(1.4)}
.hint{position:fixed;top:14px;left:14px;font-size:12px;color:#C2A78B;letter-spacing:1.5px;opacity:.5}
@media (prefers-color-scheme: dark){html,body{background:#FDFCFA}}
</style>
</head>
<body>
<div class="hint">← → · ESPACIO PARA AVANZAR · F11 PANTALLA COMPLETA</div>
<div class="stage"><img id="img" alt=""></div>
<div class="bar" id="bar"></div>
<script>
const slides = [
  "slide-01-apertura.png",
  "slide-02-el-mecanismo.png",
  "slide-03-por-qué-no-se-calla.png",
  "slide-04-una-intervención.png",
  "slide-05-cierre.png",
  "slide-06-freud-el-malestar-en-la-cultura-1930.png",
  "slide-07-lacan-función-y-campo-de-la-palabra.png",
  "slide-08-kohut-la-restauración-del-sí-mismo.png",
  "slide-09-winnicott-el-falso-self.png"
];
let i = 0;
const img = document.getElementById("img");
const bar = document.getElementById("bar");
slides.forEach((_, idx) => {
  const d = document.createElement("div");
  d.className = "dot";
  d.onclick = () => go(idx);
  bar.appendChild(d);
});
function go(n) {
  i = ((n % slides.length) + slides.length) % slides.length;
  img.style.opacity = 0;
  setTimeout(() => {
    img.src = slides[i];
    img.style.opacity = 1;
    [...bar.children].forEach((d, j) => d.classList.toggle("active", j === i));
  }, 120);
  // preload siguiente
  const nx = new Image();
  nx.src = slides[(i + 1) % slides.length];
}
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") go(i + 1);
  if (e.key === "ArrowLeft" || e.key === "PageUp") go(i - 1);
  if (e.key === "Home") go(0);
  if (e.key === "End") go(slides.length - 1);
  if (e.key >= "1" && e.key <= "9") go(parseInt(e.key) - 1);
});
go(0);
</script>
</body>
</html>
