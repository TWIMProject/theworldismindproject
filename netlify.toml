[build]
  command = ""
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  AWS_LAMBDA_JS_RUNTIME = "nodejs20.x"

[functions]
  node_bundler = "esbuild"

# Forzar trailing slash en URLs de directorio. La versión sin slash daba
# error al compartirla (ej. /newsletter en lugar de /newsletter/). Estas
# reglas garantizan que ambas formas funcionen.
[[redirects]]
  from = "/newsletter"
  to = "/newsletter/"
  status = 301
  force = true

[[redirects]]
  from = "/insights"
  to = "/insights/"
  status = 301
  force = true

[[redirects]]
  from = "/talleres"
  to = "/talleres/"
  status = 301
  force = true

[[redirects]]
  from = "/soluciones"
  to = "/soluciones/"
  status = 301
  force = true

[[redirects]]
  from = "/libro-engranajes-mente"
  to = "/libro-engranajes-mente/"
  status = 301
  force = true

[[redirects]]
  from = "/psicologo-ansiedad-valencia"
  to = "/psicologo-ansiedad-valencia/"
  status = 301
  force = true
